<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaturanga - Ancient Indian Heritage Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 🌌 ব্যাকগ্রাউন্ড আর্টটিকে হালকা ও মসৃণভাবে অ্যানিমেট করার জন্য */
        @keyframes ambientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: #2a1408; /* ব্যাকগ্রাউন্ড কালো না রেখে একটি রাজকীয় ব্রাউন টোন দেওয়া হলো */
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        /* 🚀 পুরো স্ক্রিন জুড়ে নতুন রাজকীয় ব্যাকগ্রাউন্ড আর্ট সেট করা (কালো ভাব দূর করতে) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(30, 15, 5, 0.45), rgba(15, 5, 2, 0.65)),
                url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200&auto=format&fit=crop'); 
            background-size: cover;             /* ছবি পুরো স্ক্রিন জুড়ে ছড়িয়ে থাকবে */
            background-position: center;
            background-attachment: fixed;
            will-change: background-position;
            animation: ambientGlow 25s ease infinite;
        }

        .ashtapada-board {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            border: 6px solid #7c2d12;
            box-shadow: 0 0 35px rgba(234, 179, 8, 0.25), 0 20px 50px rgba(0, 0, 0, 0.95);
            border-radius: 8px;
        }

        .ashtapada-square {
            background-color: #f1dec1;
            border: 1px solid #7c2d12;
            transition: background-color 0.15s ease;
        }
        
        .marked-square::after {
            content: "✕";
            position: absolute;
            color: #7c2d12;
            opacity: 0.2;
            font-size: 1.8rem;
            font-weight: 300;
        }
        
        .selected { 
            background-color: #eab308 !important; 
            box-shadow: inset 0 0 10px #7c2d12;
        }
        
        .possible-move-marker::before {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            z-index: 10;
        }
        
        .possible-capture-marker {
            background-color: #fca5a5 !important;
            box-shadow: inset 0 0 8px #dc2626 !important;
        }

        .heritage-card {
            background: linear-gradient(135deg, rgba(42, 20, 10, 0.95) 0%, rgba(18, 3, 0, 0.98) 100%);
            border: 1px solid #b45309;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        }

        /* ✨ Glassmorphism বাটনগুলোর স্টাইল */
        .glass-btn-inactive {
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
            border: 1px solid rgba(251, 191, 36, 0.15) !important;
            color: rgba(254, 243, 199, 0.7) !important;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-btn-active {
            background: rgba(217, 119, 6, 0.25) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(251, 191, 36, 0.6) !important;
            color: #fef08a !important;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.3), inset 0 0 10px rgba(251, 191, 36, 0.2) !important;
            text-shadow: 0 0 4px rgba(251, 191, 36, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-btn-reset {
            background: rgba(239, 68, 68, 0.08) !important;
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
            border: 1px solid rgba(239, 68, 68, 0.3) !important;
            color: #fca5a5 !important;
            transition: all 0.3s ease;
        }

        .glass-btn-reset:active {
            background: rgba(239, 68, 68, 0.25) !important;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4) !important;
        }
    </style>
</head>
    
<body class="min-h-screen flex flex-col items-center justify-start p-3 md:p-6 text-amber-100 font-serif relative">

    <div class="w-full max-w-md heritage-card p-4 md:p-5 rounded-xl border border-amber-500/30 backdrop-blur-md bg-stone-950/40 relative z-10">
        
        <header class="text-center mb-4">
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-wide text-amber-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] font-serif uppercase">
                CHATURANGA
            </h1>
            <p class="text-[9px] md:text-[10px] tracking-widest text-amber-200/70 font-sans uppercase mt-0.5">
                Ancient Indian Heritage Engine
            </p>
        </header>

        <div class="mb-4 flex items-center justify-between px-3 py-1.5 rounded-lg bg-emerald-950/20 border border-emerald-500/20 backdrop-blur-sm">
            <div class="flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="text-[10px] md:text-[11px] font-sans font-medium text-emerald-300 tracking-wide uppercase">
                    Live Players Online
                </span>
            </div>
            <span class="text-[11px] font-sans font-bold bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded border border-emerald-500/30 animate-pulse">
                42 Active
            </span>
        </div>

        <div class="flex gap-2.5 mb-4">
            <button id="btnAI" onclick="switchMode('Vs-AI')" class="flex-1 py-2 text-[11px] font-bold rounded font-sans glass-btn-active">
                ⚔️ VS COMPUTER
            </button>
            <button id="btn2P" onclick="switchMode('2-Player')" class="flex-1 py-2 text-[11px] font-bold rounded cursor-pointer transition font-sans glass-btn-inactive">
                👥 2-PLAYER LOCAL
            </button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4 text-[10px] font-sans">
            <div class="p-2 rounded-lg bg-black/20 border border-amber-900/20 backdrop-blur-sm">
                <div id="loss-title-1" class="text-red-400/80 font-bold mb-1 uppercase tracking-tighter">💀 Your Losses</div>
                <div id="white-graveyard" class="flex flex-wrap gap-1 min-h-[20px] text-base"></div>
            </div>
            <div class="p-2 rounded-lg bg-black/20 border border-amber-900/20 backdrop-blur-sm">
                <div id="loss-title-2" class="text-amber-400/80 font-bold mb-1 uppercase tracking-tighter">💀 Computer Losses</div>
                <div id="black-graveyard" class="flex flex-wrap gap-1 min-h-[20px] text-base"></div>
            </div>
        </div>

        <div class="flex justify-center mb-4">
            <div id="board" class="ashtapada-board grid grid-cols-8 grid-rows-8 bg-[#f1dec1]"></div>
        </div>

        <button onclick="triggerReset()" class="w-full py-2.5 text-[11px] font-bold rounded cursor-pointer font-sans uppercase tracking-wider glass-btn-reset">
            ♻️ RE-INITIALIZE ENGAGEMENT
        </button>
    </div>

    <div id="gameOverModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden backdrop-blur-sm">
        <div class="w-full max-w-xs bg-stone-950/80 border border-amber-500/40 p-5 rounded-xl text-center shadow-2xl backdrop-blur-lg">
            <div id="modalIcon" class="text-4xl mb-2 animate-bounce">👑</div>
            <h2 id="modalTitle" class="text-xl font-black text-amber-400 uppercase tracking-wide font-serif mb-1">VICTORY!</h2>
            <div id="modalDesc" class="text-stone-300 text-[11px] leading-relaxed mb-4 font-sans"></div>
            <button onclick="triggerReset()" class="w-full py-2 bg-amber-600 hover:bg-amber-700 active:bg-amber-800 text-stone-950 font-bold text-xs rounded font-sans uppercase tracking-wider shadow-md transition">
                Accept Fate & Restart
            </button>
        </div>
    </div>
    
        <script>
        // 🚀 আপনার রিয়েল Vercel API ডোমেন যুক্ত করা হলো
        const VERCEL_API_URL = "https://chaturanga-seven.vercel.app/api"; 

        const pieceSigns = { 
            "Raja": "⚜️", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "⚔️" 
        };

        let gameMetrics = {
            currentStage: 1,           
            userAggressionCount: 0, 
            userMistakes: [],
            matchMoveHistory: [],
            consecutiveUserLosses: 0   
        };

        let aiDatabase = {
            userWinningTraps: []
        };

        let currentMode = "Vs-AI"; 
        let isGameOver = false; 
        let capturedWhite = [];
        let capturedBlack = [];
        let initialSetup = {};

        const markedSquares = ["0-0", "0-3", "0-4", "0-7", "3-0", "3-3", "3-4", "3-7", "4-0", "4-3", "4-4", "4-7", "7-0", "7-3", "7-4", "7-7"];
        const boardElement = document.getElementById('board');
        const modalElement = document.getElementById('gameOverModal');
        let selectedSquare = null;
        let highlightedMoves = [];
        let isPlayer1Turn = true; 

        // 🌐 Vercel-এর ডাটাবেস থেকে গ্লোবাল এআই জেতার কৌশল লোড করা
        async function loadGlobalAIDatabase() {
            try {
                const response = await fetch(`${VERCEL_API_URL}/get-strategies`);
                if (response.ok) {
                    const data = await response.json();
                    aiDatabase.userWinningTraps = data.traps || [];
                    console.log("Vercel Database loaded successfully from chaturanga-seven.");
                }
            } catch (error) {
                console.error("Vercel fetch bypassed, offline mode active.", error);
            }
        }

        // 💾 ব্যবহারকারীর জেতার চালগুলো Vercel ডাটাবেসে সেভ করা
        async function syncTrapToVercelDatabase(winningMove) {
            try {
                await fetch(`${VERCEL_API_URL}/save-strategy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move: winningMove })
                });
                console.log("Strategy synchronized with chaturanga-seven Vercel Database.");
            } catch (error) {
                console.error("Vercel cloud sync bypass.", error);
            }
        }

        function resetInitialSetup() {
            initialSetup = {
                "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Raja", isWhite: false },
                "0-4": { name: "Mantri", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
                "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
                "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

                "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
                "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
                "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
                "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
            };
        }

        function switchMode(mode) {
            currentMode = mode;
            if(mode === "Vs-AI") {
                gameMetrics.currentStage = 1; 
                gameMetrics.consecutiveUserLosses = 0;
            }
            triggerReset();
        }

        function triggerReset() {
            selectedSquare = null;
            highlightedMoves = [];
            isPlayer1Turn = true;
            isGameOver = false;
            capturedWhite = [];
            capturedBlack = [];
            gameMetrics.matchMoveHistory = [];
            resetInitialSetup();
            modalElement.classList.add('hidden');
            
            document.getElementById('btn2P').className = currentMode === '2-Player' ? 'flex-1 py-2 text-[11px] font-bold rounded font-sans glass-btn-active' : 'flex-1 py-2 text-[11px] font-bold rounded cursor-pointer transition font-sans glass-btn-inactive';
            document.getElementById('btnAI').className = currentMode === 'Vs-AI' ? 'flex-1 py-2 text-[11px] font-bold rounded font-sans glass-btn-active' : 'flex-1 py-2 text-[11px] font-bold rounded cursor-pointer transition font-sans glass-btn-inactive';
            
            if (currentMode === 'Vs-AI') {
                document.getElementById('loss-title-1').innerText = "💀 Your Losses";
                document.getElementById('loss-title-2').innerText = "💀 Computer Losses";
            } else {
                document.getElementById('loss-title-1').innerText = "💀 Player 1 Losses";
                document.getElementById('loss-title-2').innerText = "💀 Player 2 Losses";
            }
            createBoard();
        }
                    function generateAITeachingReport(userWon) {
            if (currentMode !== 'Vs-AI') return "Local Match Over.";
            if (userWon) {
                gameMetrics.consecutiveUserLosses = 0; 
                gameMetrics.currentStage = Math.min(gameMetrics.currentStage + 1, 3); 
                if(gameMetrics.matchMoveHistory.length > 0) {
                    const lastWinningMove = gameMetrics.matchMoveHistory[gameMetrics.matchMoveHistory.length - 1];
                    aiDatabase.userWinningTraps.push(lastWinningMove);
                    syncTrapToVercelDatabase(lastWinningMove); // ⚡ Vercel সার্ভারে ডেটা পুশ
                }
                return "🎯 CONGRATULATIONS! You defeated the AI. Progression updated. Moving to Stage " + gameMetrics.currentStage + " for the next match.";
            }

            gameMetrics.consecutiveUserLosses++; 
            let advise = "🏛️ [AI COURT CHRONICLE REPORT]:\n";
            if (gameMetrics.consecutiveUserLosses >= 2) {
                gameMetrics.currentStage = 1; 
                gameMetrics.consecutiveUserLosses = 0;
                advise += "CRITICAL PATTERN RECOVERY: Consecutive losses detected. Resetting AI Engine to Stage 1.";
            } else {
                advise += "CURRENT RATING: Stage " + gameMetrics.currentStage + " ongoing. ";
                if (gameMetrics.userAggressionCount < 3) {
                    advise += "Vanguard files remained static. Deploy Ashva & Padati early.";
                } else if (gameMetrics.userMistakes.includes("Raja_exposed")) {
                    advise += "Tactical blunder detected. Left your Raja completely unguarded.";
                } else {
                    advise += "Heavy armor assets (Ratha & Gaja) were severely underutilized.";
                }
            }
            return advise;
        }

        function showEndGameModal(title, description, icon, userWon) {
            const teachingReport = generateAITeachingReport(userWon);
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = `<span class="block mb-3">${description}</span><div class="bg-stone-900 p-2.5 rounded text-left text-amber-400 border border-amber-900/40 text-[11px] leading-relaxed font-sans whitespace-pre-line">${teachingReport}</div>`;
            document.getElementById('modalIcon').innerText = icon;
            modalElement.classList.remove('hidden');
            gameMetrics.userMistakes = [];
            gameMetrics.userAggressionCount = 0;
        }

        function checkLegalMove(piece, fromR, fromC, toR, toC) {
            if (toR < 0 || toR > 7 || toC < 0 || toC > 7) return false;
            if (fromR === toR && fromC === toC) return false;
            const rowDiff = Math.abs(toR - fromR);
            const colDiff = Math.abs(toC - fromC);
            const target = initialSetup[`${toR}-${toC}`];
            if (target && target.isWhite === piece.isWhite) return false;

            switch (piece.name) {
                case 'Padati': 
                    const dir = piece.isWhite ? -1 : 1;
                    if (fromC === toC && toR === fromR + dir) return !target; 
                    if (colDiff === 1 && toR === fromR + dir) return target && target.isWhite !== piece.isWhite;
                    return false;
                case 'Ratha': 
                    if (fromR !== toR && fromC !== toC) return false;
                    const stepR = fromR === toR ? 0 : (toR > fromR ? 1 : -1);
                    const stepC = fromC === toC ? 0 : (toC > fromC ? 1 : -1);
                    let checkR = fromR + stepR;
                    let checkC = fromC + stepC;
                    while (checkR !== toR || checkC !== toC) {
                        if (initialSetup[`${checkR}-${checkC}`]) return false; 
                        checkR += stepR;
                        checkC += stepC;
                    }
                    return true;
                case 'Ashva': 
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'Gaja': 
                    return rowDiff === 2 && colDiff === 2; 
                case 'Raja':
                    return rowDiff <= 1 && colDiff <= 1;
                case 'Mantri':
                    return rowDiff === 1 && colDiff === 1;
                default:
                    return false;
            }
        }

        function calculatePossibleMoves(row, col, piece) {
            const validDestinations = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (checkLegalMove(piece, row, col, r, c)) validDestinations.push(`${r}-${c}`);
                }
            }
            return validDestinations;
        }

        function updateGraveyardUI() {
            document.getElementById('black-graveyard').innerHTML = capturedBlack.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
            document.getElementById('white-graveyard').innerHTML = capturedWhite.map(p => `<span>${pieceSigns[p]}</span>`).join(' ');
            }
                    function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none aspect-square relative overflow-hidden';
                    if (markedSquares.includes(squareId)) square.classList.add('marked-square');
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) square.classList.add('selected');
                    if (!isGameOver && selectedSquare && highlightedMoves.includes(squareId)) {
                        square.classList.add(initialSetup[squareId] ? 'possible-capture-marker' : 'possible-move-marker');
                    }
                    const piece = initialSetup[squareId];
                    if (piece) {
                        const labelColor = piece.isWhite ? 'text-amber-900' : 'text-red-900';
                        square.innerHTML = `
                            <span class="text-xl md:text-2xl z-10 filter drop-shadow-sm">${pieceSigns[piece.name]}</span>
                            <span class="text-[7px] ${labelColor} font-bold z-10 uppercase font-sans tracking-tighter leading-none mt-0.5">${piece.name}</span>
                        `;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
            updateGraveyardUI();
        }

        function handleSquareClick(row, col) {
            if (isGameOver) return;
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece) {
                    if (currentMode === '2-Player' && targetPiece.isWhite !== isPlayer1Turn) return;
                    if (currentMode === 'Vs-AI' && !targetPiece.isWhite) return;
                    selectedSquare = { row, col, piece: targetPiece };
                    highlightedMoves = calculatePossibleMoves(row, col, targetPiece);
                    createBoard();
                }
            } else {
                const fromKey = `${selectedSquare.row}-${selectedSquare.col}`;
                const isLegal = checkLegalMove(selectedSquare.piece, selectedSquare.row, selectedSquare.col, row, col);
                if (!isLegal) {
                    selectedSquare = null;
                    highlightedMoves = [];
                    createBoard();
                    return;
                }

                if (targetPiece) gameMetrics.userAggressionCount++;
                if (selectedSquare.piece.name === 'Raja' && row < 6) gameMetrics.userMistakes.push("Raja_exposed");

                gameMetrics.matchMoveHistory.push({ from: fromKey, to: squareId, piece: selectedSquare.piece.name });

                if (targetPiece) {
                    if (targetPiece.isWhite) {
                        capturedWhite.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("DEFEAT", "The Computer AI captured your Raja!", "💀", false);
                            return;
                        }
                    } else {
                        capturedBlack.push(targetPiece.name);
                        if (targetPiece.name === 'Raja') {
                            isGameOver = true;
                            createBoard();
                            showEndGameModal("VICTORY!", "You captured the opposing throne!", "👑", true);
                            return;
                        }
                    }
                }

                let pieceNameToDeploy = selectedSquare.piece.name;
                if (pieceNameToDeploy === 'Padati' && (row === 0 || row === 7)) pieceNameToDeploy = 'Mantri';

                delete initialSetup[fromKey];
                initialSetup[squareId] = { name: pieceNameToDeploy, isWhite: selectedSquare.piece.isWhite };
                selectedSquare = null;
                highlightedMoves = [];
                createBoard();

                if (isGameOver) return;
                if (currentMode === 'Vs-AI') {
                    setTimeout(triggerAiEngineLogic, 300); 
                } else {
                    isPlayer1Turn = !isPlayer1Turn;
                }
            }
        }

        function evaluateBoardState() {
            const scores = { 'Raja': 10000, 'Mantri': 90, 'Ratha': 50, 'Gaja': 40, 'Ashva': 30, 'Padati': 10 };
            let totalVal = 0;
            for (const key in initialSetup) {
                const piece = initialSetup[key];
                const [r, c] = key.split('-').map(Number);
                let weight = scores[piece.name];
                if (piece.name === 'Padati') weight += piece.isWhite ? (7 - r) : r;
                if (piece.isWhite) totalVal -= weight; else totalVal += weight;
            }
            return totalVal;
        }

        function minimax(depth, isAiMaximizing) {
            if (depth === 0 || isGameOver) return evaluateBoardState();
            const aiMoves = [];
            for (const key in initialSetup) {
                const isWhitePiece = initialSetup[key].isWhite;
                if ((isAiMaximizing && !isWhitePiece) || (!isAiMaximizing && isWhitePiece)) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    for (let toR = 0; toR < 8; toR++) {
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                aiMoves.push({ from: key, to: `${toR}-${toC}`, piece: piece });
                            }
                        }
                    }
                }
            }
            if (aiMoves.length === 0) return evaluateBoardState();

            if (isAiMaximizing) {
                let maxEval = -Infinity;
                for (const move of aiMoves) {
                    const backup = initialSetup[move.to];
                    initialSetup[move.to] = initialSetup[move.from];
                    delete initialSetup[move.from];
                    let evaluation = minimax(depth - 1, false);
                    maxEval = Math.max(maxEval, evaluation);
                    initialSetup[move.from] = initialSetup[move.to];
                    if (backup) initialSetup[move.to] = backup; else delete initialSetup[move.to];
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (const move of aiMoves) {
                    const backup = initialSetup[move.to];
                    initialSetup[move.to] = initialSetup[move.from];
                    delete initialSetup[move.from];
                    let evaluation = minimax(depth - 1, true);
                    minEval = Math.min(minEval, evaluation);
                    initialSetup[move.from] = initialSetup[move.to];
                    if (backup) initialSetup[move.to] = backup; else delete initialSetup[move.to];
                }
                return minEval;
            }
        }

        function triggerAiEngineLogic() {
            if (isGameOver) return;
            const allLegalAiMoves = [];
            for (const key in initialSetup) {
                if (!initialSetup[key].isWhite) {
                    const [fromR, fromC] = key.split('-').map(Number);
                    const piece = initialSetup[key];
                    for (let toR = 0; toR < 8; toR++) { 
                        for (let toC = 0; toC < 8; toC++) {
                            if (checkLegalMove(piece, fromR, fromC, toR, toC)) {
                                const target = initialSetup[`${toR}-${toC}`];
                                allLegalAiMoves.push({ fromKey: key, toKey: `${toR}-${toC}`, piece: piece, targetPiece: target });
                            }
                        }
                    }
                }
            }

            if (allLegalAiMoves.length === 0) {
                isGameOver = true;
                showEndGameModal("STALEMATE", "The tactical engagement is a royal draw.", "🏳️", false);
                return;
            }

            if (gameMetrics.currentStage === 1) {
                allLegalAiMoves.sort((a, b) => Math.random() - 0.5);
            } else if (gameMetrics.currentStage === 2) {
                for (const move of allLegalAiMoves) {
                    const backup = initialSetup[move.toKey];
                    initialSetup[move.toKey] = initialSetup[move.fromKey];
                    delete initialSetup[move.fromKey];
                    move.minimaxWeight = evaluateBoardState(); 
                    initialSetup[move.fromKey] = initialSetup[move.toKey];
                    if (backup) initialSetup[move.toKey] = backup; else delete initialSetup[move.toKey];
                }
                allLegalAiMoves.sort((a, b) => b.minimaxWeight - a.minimaxWeight);
            } else {
                for (const move of allLegalAiMoves) {
                    const backup = initialSetup[move.toKey];
                    initialSetup[move.toKey] = initialSetup[move.fromKey];
                    delete initialSetup[move.fromKey];
                    move.minimaxWeight = minimax(2, false); 
                    aiDatabase.userWinningTraps.forEach(trap => {
                        if (trap.to === move.toKey) move.minimaxWeight += 200;
                    });
                    initialSetup[move.fromKey] = initialSetup[move.toKey];
                    if (backup) initialSetup[move.toKey] = backup; else delete initialSetup[move.toKey];
                }
                allLegalAiMoves.sort((a, b) => b.minimaxWeight - a.minimaxWeight);
            }
            
            const bestMove = allLegalAiMoves[0]; 
            if (bestMove.targetPiece) {
                capturedWhite.push(bestMove.targetPiece.name);
                if (bestMove.targetPiece.name === 'Raja') {
                    isGameOver = true;
                    createBoard();
                    showEndGameModal("DEFEAT", "The Computer AI captured your Raja!", "💀", false);
                    return;
                }
            }

            delete initialSetup[bestMove.fromKey];
            initialSetup[bestMove.toKey] = { name: bestMove.piece.name, isWhite: false };
            createBoard();
        }

        // Vercel কানেকশন এবং ইনিশিয়ালাইজেশন সচল করা হলো
        loadGlobalAIDatabase();
        triggerReset();
    </script>
