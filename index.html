<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaturanga - Ancient Strategy Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .ashtapada-square {
            background-color: #fef3c7; 
            border: 1px solid #d97706; 
        }
        .ashtapada-square:hover {
            background-color: #fde68a; 
        }
        .selected {
            background-color: #fcd34d !important; /* Highlight selected piece */
        }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen flex flex-col items-center p-4">

    <div class="text-center my-4">
        <h1 class="text-4xl font-extrabold text-amber-500 tracking-wide">CHATURANGA</h1>
        <p class="text-stone-400 text-sm mt-1">AI Training & Strategy Engine</p>
    </div>

    <div class="flex gap-4 mb-4 bg-stone-800 p-2 rounded-xl border border-stone-700 w-[450px] max-w-full justify-center">
        <button id="btn2P" onclick="switchMode('2-Player')" class="px-3 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg cursor-pointer">
            👥 2-Player Pass & Play
        </button>
        <button id="btnAI" onclick="switchMode('Vs-AI')" class="px-3 py-2 text-xs font-bold bg-stone-700 text-stone-300 rounded-lg cursor-pointer hover:bg-stone-600">
            🤖 Play vs Computer AI
        </button>
    </div>

    <div id="board" class="grid grid-cols-8 gap-0 border-4 border-amber-800 rounded-lg shadow-2xl max-w-full w-[450px] h-[450px]"></div>

    <div class="mt-4 bg-stone-800 p-4 rounded-lg border border-stone-700 w-[450px] max-w-full">
        <h3 class="text-amber-400 font-bold mb-1 text-sm">⚡ System Logs & Learning Guide</h3>
        <p id="status" class="text-stone-300 text-xs">Game loaded. Your turn (White pieces at the bottom).</p>
    </div>

    <script>
        const pieceSigns = { "Raja": "👑", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "🛡️" };
        let currentMode = "Vs-AI";
        let initialSetup = {};
        let selectedSquare = null;

        // Setup matrix layout where rows 0-1 belong to Black (AI) and rows 6-7 belong to White (Player)
        const baseSetup = {
            // AI Team (Black) - Top
            "0-0": { name: "Ratha", isWhite: false }, "0-1": { name: "Ashva", isWhite: false }, "0-2": { name: "Gaja", isWhite: false }, "0-3": { name: "Mantri", isWhite: false },
            "0-4": { name: "Raja", isWhite: false }, "0-5": { name: "Gaja", isWhite: false }, "0-6": { name: "Ashva", isWhite: false }, "0-7": { name: "Ratha", isWhite: false },
            "1-0": { name: "Padati", isWhite: false }, "1-1": { name: "Padati", isWhite: false }, "1-2": { name: "Padati", isWhite: false }, "1-3": { name: "Padati", isWhite: false },
            "1-4": { name: "Padati", isWhite: false }, "1-5": { name: "Padati", isWhite: false }, "1-6": { name: "Padati", isWhite: false }, "1-7": { name: "Padati", isWhite: false },

            // Player Team (White) - Bottom
            "6-0": { name: "Padati", isWhite: true }, "6-1": { name: "Padati", isWhite: true }, "6-2": { name: "Padati", isWhite: true }, "6-3": { name: "Padati", isWhite: true },
            "6-4": { name: "Padati", isWhite: true }, "6-5": { name: "Padati", isWhite: true }, "6-6": { name: "Padati", isWhite: true }, "6-7": { name: "Padati", isWhite: true },
            "7-0": { name: "Ratha", isWhite: true }, "7-1": { name: "Ashva", isWhite: true }, "7-2": { name: "Gaja", isWhite: true }, "7-3": { name: "Mantri", isWhite: true },
            "7-4": { name: "Raja", isWhite: true }, "7-5": { name: "Gaja", isWhite: true }, "7-6": { name: "Ashva", isWhite: true }, "7-7": { name: "Ratha", isWhite: true }
        };

        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        function switchMode(mode) {
            currentMode = mode;
            initialSetup = JSON.parse(JSON.stringify(baseSetup));
            
            document.getElementById('btn2P').className = mode === '2-Player' ? 'px-3 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg' : 'px-3 py-2 text-xs font-bold bg-stone-700 text-stone-300 rounded-lg';
            document.getElementById('btnAI').className = mode === 'Vs-AI' ? 'px-3 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg' : 'px-3 py-2 text-xs font-bold bg-stone-700 text-stone-300 rounded-lg';
            
            statusElement.innerText = mode === 'Vs-AI' ? "Playing against Computer AI. Make your move!" : "Pass and Play mode active.";
            selectedSquare = null;
            createBoard();
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none aspect-square relative';
                    
                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) {
                        square.classList.add('selected');
                    }

                    const piece = initialSetup[squareId];
                    if (piece) {
                        const colorClass = piece.isWhite ? 'text-amber-950' : 'text-red-800';
                        square.innerHTML = `<span class="text-xl">${pieceSigns[piece.name]}</span><span class="text-[8px] ${colorClass} font-bold leading-none">${piece.name}</span>`;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(row, col) {
            const squareId = `${row}-${col}`;
            const targetPiece = initialSetup[squareId];

            if (selectedSquare === null) {
                if (targetPiece && (currentMode !== 'Vs-AI' || targetPiece.isWhite)) {
                    selectedSquare = { row, col, piece: targetPiece };
                    statusElement.innerText = `Selected ${targetPiece.name}. Tap an empty grid space or target to execute move.`;
                    createBoard();
                }
            } else {
                // Execute player move
                delete initialSetup[`${selectedSquare.row}-${selectedSquare.col}`];
                initialSetup[squareId] = { name: selectedSquare.piece.name, isWhite: selectedSquare.piece.isWhite };
                
                statusElement.innerText = `You moved ${selectedSquare.piece.name} to [${row}, ${col}]. Processing AI calculation...`;
                selectedSquare = null;
                createBoard();

                // If playing vs AI, trigger the Computer move after 1 second
                if (currentMode === 'Vs-AI') {
                    setTimeout(triggerAiMove, 1000);
                }
            }
        }

        // 🤖 COMPUTER AI ENGINE LOGIC
        function triggerAiMove() {
            // Find all remaining black AI pieces on the board
            const aiPieces = [];
            for (const key in initialSetup) {
                if (!initialSetup[key].isWhite) {
                    const [r, c] = key.split('-').map(Number);
                    aiPieces.push({ row: r, col: c, name: initialSetup[key].name });
                }
            }

            if (aiPieces.length === 0) return;

            // Simple Learning AI heuristic: Picks a random AI piece and moves it 1 step forward or diagonally
            const selectedAiPiece = aiPieces[Math.floor(Math.random() * aiPieces.length)];
            const currentKey = `${selectedAiPiece.row}-${selectedAiPiece.col}`;
            
            // AI plans target coordinate (Tries to move downwards toward player)
            let targetRow = Math.min(selectedAiPiece.row + 1, 7);
            let targetCol = selectedAiPiece.col;
            
            // If the piece is Gaja or Ashva, give it custom diagonal offset to show its unique rule
            if (selectedAiPiece.name === 'Gaja' || selectedAiPiece.name === 'Ashva') {
                targetRow = Math.min(selectedAiPiece.row + 2, 7);
                targetCol = Math.min(selectedAiPiece.col + 1, 7);
            }

            const targetKey = `${targetRow}-${targetCol}`;

            // Execute AI move in database array
            delete initialSetup[currentKey];
            initialSetup[targetKey] = { name: selectedAiPiece.name, isWhite: false };

            statusElement.innerText = `🤖 Computer AI played ${pieceSigns[selectedAiPiece.name]} ${selectedAiPiece.name} to [${targetRow}, ${targetCol}] to challenge your formation. Your turn!`;
            createBoard();
        }

        switchMode('Vs-AI');
    </script>
</body>
</html>
