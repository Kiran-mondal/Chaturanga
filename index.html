<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaturanga - Ancient Strategy Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .ashtapada-square {
            background-color: #fef3c7; 
            border: 1px solid #d97706; 
        }
        .ashtapada-square:hover {
            background-color: #fde68a; 
        }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen flex flex-col items-center p-4">

    <div class="text-center my-4">
        <h1 class="text-4xl font-extrabold text-amber-500 tracking-wide">CHATURANGA</h1>
        <p class="text-stone-400 text-sm mt-1">Multi-Mode Ashtapada Strategy Engine</p>
    </div>

    <!-- 🎮 MODE SELECTION INTERFACE -->
    <div class="flex gap-4 mb-4 bg-stone-800 p-2 rounded-xl border border-stone-700 w-[450px] max-w-full justify-center">
        <button id="btn2P" onclick="switchMode('2-Player')" class="px-4 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg shadow-md cursor-pointer transition-all">
            👥 2-Player Standard
        </button>
        <button id="btn4P" onclick="switchMode('4-Player')" class="px-4 py-2 text-xs font-bold bg-stone-700 text-stone-300 rounded-lg cursor-pointer transition-all hover:bg-stone-600">
            👑 4-Player (Chaturaji) Mode
        </button>
    </div>

    <!-- The 8x8 Game Board Container -->
    <div id="board" class="grid grid-cols-8 gap-0 border-4 border-amber-800 rounded-lg shadow-2xl max-w-full w-[450px] h-[450px]"></div>

    <div class="mt-4 bg-stone-800 p-4 rounded-lg border border-stone-700 w-[450px] max-w-full">
        <h3 class="text-amber-400 font-bold mb-1 text-sm">⚡ Engine Status</h3>
        <p id="status" class="text-stone-300 text-xs">Game loaded in 2-Player setup.</p>
    </div>

    <!-- Dynamic Rules text from JSON structure -->
    <div class="mt-4 bg-stone-950 p-4 rounded-xl border border-amber-900/40 w-[450px] max-w-full text-xs text-stone-400">
        <span class="text-amber-400 font-bold">💡 Current Mode Rule:</span>
        <p id="mode-desc" class="mt-1">Traditional 2-sided military simulation. White vs Black setup on opposing edges.</p>
    </div>

    <script>
        const pieceSigns = { "Raja": "👑", "Mantri": "📜", "Gaja": "🐘", "Ashva": "🐎", "Ratha": "🛕", "Padati": "🛡️" };
        let currentMode = "2-Player";
        let initialSetup = {};

        const setups = {
            "2-Player": {
                "0-0": "Ratha", "0-1": "Ashva", "0-2": "Gaja", "0-3": "Mantri", "0-4": "Raja", "0-5": "Gaja", "0-6": "Ashva", "0-7": "Ratha",
                "1-0": "Padati", "1-1": "Padati", "1-2": "Padati", "1-3": "Padati", "1-4": "Padati", "1-5": "Padati", "1-6": "Padati", "1-7": "Padati"
            },
            "4-Player": {
                // Corner positions mimicking traditional 4-player Chaturaji layout
                "0-0": "Ratha", "0-1": "Ashva", "0-2": "Gaja", "0-3": "Raja", "1-0": "Padati", "1-1": "Padati", "1-2": "Padati", "1-3": "Padati",
                "7-7": "Ratha", "7-6": "Ashva", "7-5": "Gaja", "7-4": "Raja", "6-7": "Padati", "6-6": "Padati", "6-5": "Padati", "6-4": "Padati",
                "0-7": "Ratha", "1-7": "Ashva", "2-7": "Gaja", "3-7": "Raja", "0-6": "Padati", "1-6": "Padati", "2-6": "Padati", "3-6": "Padati",
                "7-0": "Ratha", "6-0": "Ashva", "5-0": "Gaja", "4-0": "Raja", "7-1": "Padati", "6-1": "Padati", "5-1": "Padati", "4-1": "Padati"
            }
        };

        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const modeDesc = document.getElementById('mode-desc');
        let selectedSquare = null;

        function switchMode(mode) {
            currentMode = mode;
            initialSetup = JSON.parse(JSON.stringify(setups[mode]));
            
            document.getElementById('btn2P').className = mode === '2-Player' ? 'px-4 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg shadow-md cursor-pointer' : 'px-4 py-2 text-xs font-bold bg-stone-700 text-stone-300 rounded-lg cursor-pointer hover:bg-stone-600';
            document.getElementById('btn4P').className = mode === '4-Player' ? 'px-4 py-2 text-xs font-bold bg-amber-600 text-stone-950 rounded-lg shadow-md cursor-pointer' : 'px-4 py-2 text-xs font-bold bg-stone-700 text-stone-300 rounded-lg cursor-pointer hover:bg-stone-600';
            
            modeDesc.innerText = mode === '2-Player' ? "Traditional 2-sided military simulation. White vs Black setup on opposing edges." : "Ancient Chaturaji mode. 4 players control 4 corners clockwise (Red, Green, Yellow, Black armies). Historically uses a 4-sided stick dice to decide moves.";
            statusElement.innerText = `Game mode shifted to ${mode}. Board refreshed.`;
            createBoard();
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareId = `${row}-${col}`;
                    const square = document.createElement('div');
                    square.className = 'ashtapada-square flex flex-col items-center justify-center cursor-pointer select-none aspect-square relative';
                    
                    const pieceName = initialSetup[squareId];
                    if (pieceName) {
                        square.innerHTML = `<span class="text-xl">${pieceSigns[pieceName]}</span><span class="text-[8px] text-amber-900 font-bold leading-none">${pieceName}</span>`;
                    }
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(row, col) {
            const squareId = `${row}-${col}`;
            if (selectedSquare === null) {
                if (initialSetup[squareId]) {
                    selectedSquare = { row, col, piece: initialSetup[squareId] };
                    statusElement.innerText = `Staged ${pieceSigns[selectedSquare.piece]} from [${row}, ${col}].`;
                }
            } else {
                statusElement.innerText = `Moved ${selectedSquare.piece} to [${row}, ${col}]. Processing JSON profile boundaries...`;
                delete initialSetup[`${selectedSquare.row}-${selectedSquare.col}`];
                initialSetup[squareId] = selectedSquare.piece;
                selectedSquare = null;
                createBoard();
            }
        }

        // Load Default setup
        switchMode('2-Player');
    </script>
</body>
</html>
